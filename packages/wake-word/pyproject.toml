[project]
name = "wake-word"
version = "0.0.0"
description = "Micro wake word detection for SHARD"
requires-python = ">=3.12"
dependencies = [
    "pymicro-wakeword",
    "sounddevice",
    "nats-py",
]

[project.optional-dependencies]
dev = [
    "ruff",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
# E = pycodestyle, F = pyflakes, I = isort, N = pep8-naming, UP = pyupgrade
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.format]
quote-style = "double"